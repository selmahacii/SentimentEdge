name: Market Sentiment Analyzer - CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Linting Tools
      run: |
        pip install ruff black isort
    - name: Run Linting
      run: |
        ruff check market_sentiment/
        black --check market_sentiment/
        isort --check-all market_sentiment/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r market_sentiment/requirements.txt
    - name: Run Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/market_sentiment
        pytest market_sentiment/tests/ --no-llm

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker Image
      run: |
        cd market_sentiment
        docker build -t market-sentiment-analyzer:latest .
